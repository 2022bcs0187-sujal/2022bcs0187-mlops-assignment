stages:
  preprocess:
    cmd: python src/preprocess.py
    deps:
    - data/loan_approval_dataset.csv
    - src/preprocess.py
    outs:
    - data/processed
  train:
    cmd: python src/train.py
    deps:
    - data/processed/X.csv
    - data/processed/y.csv
    - src/train.py
    outs:
    - reports/metrics.json
